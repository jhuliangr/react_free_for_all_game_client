name: CI workflow

on:
  pull_request:
    branches:
      - main
jobs:
  ci:
    name: Lint, Format and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check format
        run: npm run format-detect

      - name: Test
        run: npm run test
        
  test-playwright:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Create .env
      run: |
        echo "VITE_SERVER_LINK=${{ secrets.VITE_SERVER_LINK }}" >> .env
        echo "VITE_WS_SERVER=${{ secrets.VITE_WS_SERVER }}" >> .env
    - name: Run Playwright tests
      run: pnpm pw-headless
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
